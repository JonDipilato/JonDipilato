<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Jon DiPilato — AI Automation Builder, Systems Architect, Founder">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1726"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F8FC"/>
      <stop offset="0.42" stop-color="#C6D2E0"/>
      <stop offset="0.72" stop-color="#828F9F"/>
      <stop offset="1" stop-color="#C9D6E5"/>
    </linearGradient>
    <linearGradient id="brassline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E6B23E" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#E6B23E"/>
      <stop offset="1" stop-color="#E6B23E" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="voltglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2C8DFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2C8DFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#22304A" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
    <g id="gear">
      <g fill="none" stroke="#E6B23E" stroke-width="5">
        <circle r="52"/>
        <circle r="20"/>
        <g id="teeth">
          <rect x="-8" y="-72" width="16" height="18" rx="3" fill="#E6B23E" stroke="none"/>
        </g>
        <use href="#teeth" transform="rotate(45)"/>
        <use href="#teeth" transform="rotate(90)"/>
        <use href="#teeth" transform="rotate(135)"/>
        <use href="#teeth" transform="rotate(180)"/>
        <use href="#teeth" transform="rotate(225)"/>
        <use href="#teeth" transform="rotate(270)"/>
        <use href="#teeth" transform="rotate(315)"/>
      </g>
    </g>
  </defs>

  <rect width="1200" height="260" fill="url(#ink)"/>
  <rect width="1200" height="260" fill="url(#grid)"/>
  <ellipse cx="600" cy="150" rx="480" ry="150" fill="url(#voltglow)"/>

  <g opacity="0.35">
    <g transform="translate(1060,130)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="48s" repeatCount="indefinite"/>
        <use href="#gear"/>
      </g>
    </g>
    <g transform="translate(140,130)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="48s" repeatCount="indefinite"/>
        <use href="#gear"/>
      </g>
    </g>
  </g>

  <text x="600" y="92" text-anchor="middle" fill="#2C8DFF"
        font-family="'IBM Plex Mono','Consolas','Courier New',monospace"
        font-size="15" font-weight="600" letter-spacing="7">AI AUTOMATION BUILDER · SYSTEMS ARCHITECT · FOUNDER</text>

  <text x="600" y="158" text-anchor="middle" fill="url(#metal)"
        font-family="'Saira','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="64" font-weight="800" letter-spacing="1">Jon DiPilato</text>

  <rect x="400" y="188" width="400" height="2" fill="url(#brassline)"/>

  <text x="600" y="222" text-anchor="middle" fill="#8593A6"
        font-family="'IBM Plex Mono','Consolas','Courier New',monospace"
        font-size="13" letter-spacing="3">IF A HUMAN DOES IT TWICE, I AUTOMATE IT</text>

  <rect x="0" y="257" width="1200" height="3" fill="#22304A"/>
</svg>
