name: Latest YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Pull latest YouTube videos
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UC6yHRqsyOWrpfvgMn_sYOkg,https://www.youtube.com/feeds/videos.xml?channel_id=UCvJozojsjgkE5QITLfvaY1g"
          max_post_count: 5
          comment_tag_name: "YOUTUBE"
